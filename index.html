<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CheckIT Legal</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

:root {
  --accent: #28a745;
  --accent-dark: #1e7e34;
  --text: #111;
  --muted: #666;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background: linear-gradient(180deg, #f4faf6 0%, #ffffff 220px);
  margin: 0;
  padding: 0;
  color: var(--text);
  line-height: 1.7;
  min-height: 100vh;
}

.hero {
  text-align: center;
  padding: 64px 20px 28px;
}

.hero .logo-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 56px;
  height: 56px;
  border-radius: 16px;
  background: var(--accent);
  color: #fff;
  font-weight: 800;
  font-size: 22px;
  margin-bottom: 18px;
  box-shadow: 0 8px 20px rgba(40, 167, 69, 0.25);
}

h1 {
  font-size: 30px;
  font-weight: 800;
  margin: 0 0 8px;
  letter-spacing: -0.3px;
}

.subtitle {
  color: var(--muted);
  font-size: 15px;
  max-width: 420px;
  margin: 0 auto;
}

.container {
  max-width: 480px;
  margin: 0 auto;
  padding: 10px 20px 60px;
}

.links {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.link-card {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #ffffff;
  padding: 20px 24px;
  border-radius: 16px;
  border: 1px solid rgba(0,0,0,0.06);
  box-shadow: 0 8px 20px rgba(0,0,0,0.04);
  text-decoration: none;
  color: var(--text);
  font-weight: 600;
  font-size: 16px;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.link-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 24px rgba(40, 167, 69, 0.12);
}

.link-card .arrow {
  color: var(--accent);
  font-weight: 700;
}

.footer {
  text-align: center;
  margin-top: 36px;
  font-size: 13px;
  color: var(--muted);
}

</style>
</head>

<body>

<div class="hero">
  <div class="logo-badge">✓</div>
  <h1>CheckIT Legal</h1>
  <p class="subtitle">This domain hosts the legal documentation for the CheckIT app.</p>
</div>

<div class="container">

  <div class="links">
    <a class="link-card" href="/terms.html">
      Terms &amp; Conditions
      <span class="arrow">→</span>
    </a>
    <a class="link-card" href="/privacy.html">
      Privacy Policy
      <span class="arrow">→</span>
    </a>
  </div>

  <p class="footer">CheckIT &middot; Use thoughtfully. Verify responsibly.</p>
